#
# Schéma každé položky:
#   id:        ASCII kebab-case identifikátor (bez diakritiky); slouží jako HTML kotva
#   cz:        Český termín s diakritikou (zobrazuje se jako nadpis ve slovníku)
#   en:        Anglický ekvivalent
